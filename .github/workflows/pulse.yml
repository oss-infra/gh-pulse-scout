name: Weekly Pulse Report

on:
  schedule:
    - cron: "0 1 * * 1" # every Monday 01:00 UTC
  workflow_dispatch:
    inputs:
      repo:
        description: "owner/repo to analyze (defaults to current repo)"
        required: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gh-pulse-scout
        id: pulse
        uses: ./
        with:
          repo: ${{ github.event.inputs.repo || github.repository }}
          days: "30"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          openai-base-url: ${{ secrets.OPENAI_BASE_URL }}
          openai-model: ${{ secrets.OPENAI_MODEL }}

      # The report is exposed as a step output. Pipe it into any notification
      # action you like (DingTalk, Slack, Lark, Telegram, email, ...).
      # Example: send the rendered report to a DingTalk robot via a dedicated action.
      - name: Notify DingTalk
        uses: ghostket/dingtalk-action@v1
        with:
          webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          secret: ${{ secrets.DINGTALK_SECRET }}
          msgtype: markdown
          title: "GH Pulse Scout"
          text: ${{ steps.pulse.outputs.report }}
