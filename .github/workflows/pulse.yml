name: Weekly Pulse Report

on:
  schedule:
    - cron: "0 1 * * 1" # every Monday 01:00 UTC
  workflow_dispatch:
    inputs:
      repo:
        description: "owner/repo to analyze (defaults to current repo)"
        required: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gh-pulse-scout
        uses: ./
        with:
          repo: ${{ github.event.inputs.repo || github.repository }}
          days: "30"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          openai-base-url: ${{ secrets.OPENAI_BASE_URL }}
          openai-model: ${{ secrets.OPENAI_MODEL }}
          dingtalk-webhook: ${{ secrets.DINGTALK_WEBHOOK }}
          dingtalk-secret: ${{ secrets.DINGTALK_SECRET }}
