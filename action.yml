name: "GH Pulse Scout"
description: "Analyze recent GitHub issues over a lookback window and generate an AI-powered Markdown status report exposed as a step output."
author: "gh-pulse-scout"

branding:
  icon: "activity"
  color: "blue"

inputs:
  repo:
    description: "Target repository in owner/repo format. Defaults to the current repo."
    required: false
    default: ${{ github.repository }}
  days:
    description: "Lookback window in days."
    required: false
    default: "30"
  github-token:
    description: "GitHub token for API access."
    required: true
  openai-api-key:
    description: "OpenAI-compatible API key. If empty, AI summary is skipped."
    required: false
    default: ""
  openai-base-url:
    description: "OpenAI-compatible base URL."
    required: false
    default: "https://api.openai.com/v1"
  openai-model:
    description: "OpenAI model name."
    required: false
    default: "gpt-4o-mini"
  output-file:
    description: "Optional path to write the rendered report."
    required: false
    default: "pulse-report.md"

outputs:
  report-file:
    description: "Path to the rendered Markdown report file."
    value: ${{ steps.run.outputs.report-file }}
  report:
    description: "The rendered Markdown report content (text + AI summary)."
    value: ${{ steps.run.outputs.report }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install gh-pulse-scout
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        # Install full deps (including devDependencies like `typescript`,
        # which is required by `npm run build`). Prefer `npm ci` when a
        # lockfile is present, otherwise fall back to `npm install`.
        if [ -f package-lock.json ]; then
          npm ci --no-audit --no-fund
        else
          npm install --no-audit --no-fund
        fi
        npm run build

    - name: Run gh-pulse-scout
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        OPENAI_BASE_URL: ${{ inputs.openai-base-url }}
        OPENAI_MODEL: ${{ inputs.openai-model }}
      run: |
        AI_FLAG=""
        if [ -z "${{ inputs.openai-api-key }}" ]; then
          AI_FLAG="--no-ai"
        fi
        node "${{ github.action_path }}/dist/cli.js" \
          --repo "${{ inputs.repo }}" \
          --days "${{ inputs.days }}" \
          --output "${{ inputs.output-file }}" \
          $AI_FLAG

        echo "report-file=${{ inputs.output-file }}" >> "$GITHUB_OUTPUT"
        if [ -f "${{ inputs.output-file }}" ]; then
          {
            echo "report<<__GH_PULSE_EOF__"
            cat "${{ inputs.output-file }}"
            echo "__GH_PULSE_EOF__"
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Summary
      shell: bash
      run: |
        if [ -f "${{ inputs.output-file }}" ]; then
          {
            echo "## GH Pulse Scout report"
            echo ""
            cat "${{ inputs.output-file }}"
          } >> "$GITHUB_STEP_SUMMARY"
        fi
